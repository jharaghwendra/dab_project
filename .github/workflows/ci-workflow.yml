---
name: 'CI Workflow'

on:
  push:
    branches:
      - 'feature/**'
  pull_request:
    branches:
      - 'main'

jobs:
  ci_job:
    name: 'CI Job'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v3

      - name: 'Setup Python'
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 'Install uv'
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: 'Install dependencies'
        run: uv sync --group ci --no-dev --frozen

      - name: 'Run Pytests and generate coverage report'
        run: |
          uv run --no-sync pytest --disable-warnings --cov \
            --cov-report=term-missing \
            --cov-report=html

      - name: 'Upload coverage HTML report as artifact'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-report
          path: htmlcov
