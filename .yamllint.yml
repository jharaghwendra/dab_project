---
# yamllint configuration for this project
extends: default

rules:
  # GitHub Actions uses 'on:' as a map key (not a boolean truthy value).
  # check-keys: false tells yamllint to ignore map keys like 'on', 'off', 'yes', 'no'.
  truthy:
    allowed-values: ['true', 'false']
    check-keys: false

  # Match the line length used by ruff in pyproject.toml
  line-length:
    max: 120
