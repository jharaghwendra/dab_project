# This is a Databricks asset bundle definition for dab_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_project

include:
  - resources/jobs/*.yml
  - resources/pipelines/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
    default: "tma_dev"
  dev_flag:
    description: A flag to indicate if the environment is development
    default: true
  gaming_tables:
    description: List of gaming tables for ingestion
    default: []
  countries:
    description: List of countries for TMA ingestion
    default: []

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    presets:
      name_prefix: "[dev ${workspace.current_user.short_name}] "
    workspace:
      host: https://dbc-71b2b101-72ab.cloud.databricks.com
      profile: DEFAULT
    variables:
      countries: ["de", "at", "dk"]
      catalog: "tma_dev"
      gaming_tables: [
        "account", "bonusaggregate", "brandgame", "campaign", "check",
        "communicationaggregate", "documentaggregate", "game", "gameround",
        "gamesession", "gametransaction", "kycuseraggregate", "lock",
        "payment", "paymentledgerentry", "remarkaggregate", "session",
        "tag", "useraggregate", "userbonus", "userdata", "userlimit",
        "userlimitcap", "userlimitexceeded", "wallet", "walletbalancechange"
      ]
  test:
    mode: production
    presets:
      name_prefix: "[test] "
    workspace:
      host: https://dbc-71b2b101-72ab.cloud.databricks.com
      profile: test
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: "tma_dev"
      countries: ["de", "at", "dk"]
      dev_flag: false
    permissions:
      - service_principal_name: 5c03746d-65e1-48bc-af57-474fe2e8ed3c
        level: CAN_MANAGE
    run_as:
      service_principal_name: 5c03746d-65e1-48bc-af57-474fe2e8ed3c
  prod:
    mode: production
    workspace:
      host: https://dbc-71b2b101-72ab.cloud.databricks.com
      profile: prod
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: "tma_prod"
      countries: ["de", "at", "dk"]
      dev_flag: false
    permissions:
      - service_principal_name:  8ca0d003-42ad-44eb-b0ef-2112862316b2
        level: CAN_MANAGE
    run_as:
      service_principal_name:  8ca0d003-42ad-44eb-b0ef-2112862316b2
