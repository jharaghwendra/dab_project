# This is a Databricks asset bundle definition for dab_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_project

include:
  - resources/jobs/*.yml
  - resources/pipelines/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
    default: "citibike_dev"
  dev_flag:
    description: A flag to indicate if the environment is development
    default: true

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    presets:
      name_prefix: "[dev ${workspace.current_user.short_name}] "
    workspace:
      host: https://dbc-71b2b101-72ab.cloud.databricks.com
      profile: DEFAULT
  test:
    mode: production
    presets:
      name_prefix: "[test] "
    workspace:
      host: https://dbc-71b2b101-72ab.cloud.databricks.com
      profile: test
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: "citibike_test"
      dev_flag: false
    permissions:
      - user_name: jharaghwendra@gmail.com
        level: CAN_MANAGE
  prod:
    mode: production
    workspace:
      host: https://dbc-71b2b101-72ab.cloud.databricks.com
      profile: prod
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: "citibike_prod"
      dev_flag: false
    permissions:
      - user_name: jharaghwendra@gmail.com
        level: CAN_MANAGE
