version: 2

models:
  - name: fact_gameround
    description: >
      One row per game round. Incremental merge on round_id.
      Source: igaming_dev.silver.ig_round

    columns:
      - name: round_id
        description: "Primary key — unique game round identifier"
        tests:
          - not_null
          - unique

      - name: country_code
        description: "Country the game round belongs to"
        tests:
          - not_null
          - accepted_values:
              values: ["de", "at", "dk"]

      - name: sk_date_time
        description: "FK → dim_date_spine.sk_date_time"
        tests:
          - not_null
          - relationships:
              to: ref('dim_date_spine')
              field: sk_date_time

unit_tests:

  # ---------------------------------------------------------------------------
  # Unit test — only closed rounds included
  # Verifies: rows with closed = 0 (open rounds) must be filtered out
  # ---------------------------------------------------------------------------
  - name: unit_test_only_closed_rounds_included
    model: fact_gameround
    description: >
      Only completed (closed=1) game rounds should appear in fact_gameround.
      Open rounds (closed=0) have partial win amounts and must be excluded.

    overrides:
      macros:
        is_incremental: false

    given:
      - input: source('silver', 'ig_round')
        rows:
          # closed round — should appear
          - round_id: "ROUND-001"
            player_id: "USER-A"
            country_code: "de"
            game_id: "GAME-X"
            is_closed: 1
            is_promotional: 0
            currency_code: "EUR"
            bet_amount_eur: 10.0
            win_amount_eur: 5.0
            bonus_bet_amount_eur: 0.0
            bonus_win_amount_eur: 0.0
            tax_amount_eur: 0.0
            bet_count: 1
            win_count: 1
            created_at: "2026-01-15 10:00:00"
            finished_at: "2026-01-15 10:01:00"
            updated_at: "2026-01-15 10:01:00"
          # open round — must be EXCLUDED
          - round_id: "ROUND-002"
            player_id: "USER-B"
            country_code: "de"
            game_id: "GAME-X"
            is_closed: 0
            is_promotional: 0
            currency_code: "EUR"
            bet_amount_eur: 20.0
            win_amount_eur: 0.0
            bonus_bet_amount_eur: 0.0
            bonus_win_amount_eur: 0.0
            tax_amount_eur: 0.0
            bet_count: 1
            win_count: 0
            created_at: "2026-01-15 10:02:00"
            finished_at: null
            updated_at: "2026-01-15 10:02:00"

    expect:
      rows:
        # only ROUND-001 should appear — ROUND-002 is open (closed=0)
        - round_id: "ROUND-001"
          ggr_eur: 5.0     # betAmount_eur(10) - winAmount_eur(5)
