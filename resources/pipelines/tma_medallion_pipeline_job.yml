      # schedule:
      #   quartz_cron_expression: "0 */10 * * * ?"
      #   timezone_id: "UTC"
      #   pause_status: "UNPAUSED"
      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - ../../dist/dab_project-${var.wheel_version}-py3-none-any.whl
      tasks:
        - task_key: "00_wheel_task"
          environment_key: default
          spark_python_task:
            python_file: "../../src/dab_project/__init__.py"
            parameters: []
            source: WORKSPACE
        - task_key: "bronze_gametransaction_de"
          depends_on:
            - task_key: "00_wheel_task"
          environment_key: default
          spark_python_task:
            python_file: "../../gaming_lakehouse/scripts/01_bronze/tma_s3_to_adls_bronze.py"
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--country_code"
              - "de"
              - "--table_name"
              - "gametransaction"
            source: WORKSPACE
        - task_key: "silver_gametransaction_de"
          depends_on:
            - task_key: "bronze_gametransaction_de"
          environment_key: default
